name: e2e

# Full-stack live E2E. Reads plain REPOSITORY secrets — no GitHub
# "Environments" required (Settings → Secrets and variables → Actions →
# New repository secret):
#   PROD_SUPABASE_URL / PROD_SUPABASE_ANON_KEY / PROD_SUPABASE_SERVICE_ROLE_KEY
#   STAGING_* (optional — the staging job auto-skips until you add them)
#
# Prod runs on pushes to main + manual dispatch (not on every PR, to limit
# test-user churn in the real DB). Staging runs on PRs + pushes once set up.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - id: cfg
        run: echo "ok=${{ secrets.STAGING_SUPABASE_URL != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.cfg.outputs.ok != 'true'
        run: echo "::notice::Staging secrets not set — skipping staging E2E."
      - if: steps.cfg.outputs.ok == 'true'
        uses: actions/checkout@v4
      - if: steps.cfg.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - if: steps.cfg.outputs.ok == 'true'
        run: npm ci
      - if: steps.cfg.outputs.ok == 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.cfg.outputs.ok == 'true'
        run: npm run test:e2e
      - if: ${{ steps.cfg.outputs.ok == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 7

  prod:
    runs-on: ubuntu-latest
    # Don't create test users in the real DB on every PR — only on pushes to
    # main and manual ("Run workflow") triggers.
    if: github.event_name != 'pull_request'
    env:
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - id: cfg
        run: echo "ok=${{ secrets.PROD_SUPABASE_URL != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.cfg.outputs.ok != 'true'
        run: echo "::notice::Prod secrets not set — skipping prod E2E."
      - if: steps.cfg.outputs.ok == 'true'
        uses: actions/checkout@v4
      - if: steps.cfg.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - if: steps.cfg.outputs.ok == 'true'
        run: npm ci
      - if: steps.cfg.outputs.ok == 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.cfg.outputs.ok == 'true'
        run: npm run test:e2e
      - if: ${{ steps.cfg.outputs.ok == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report/
          retention-days: 7
