name: e2e

# Full-stack live E2E. Prod secrets live in the "Production" GitHub
# Environment; staging secrets (optional) are repository secrets.
# Prod runs on pushes to main + manual dispatch; staging on PRs once set up.

on:
  schedule:
    - cron: "0 11 * * *"   # nightly ~11:00 UTC — catch backend/key drift
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - id: cfg
        run: echo "ok=${{ secrets.STAGING_SUPABASE_URL != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.cfg.outputs.ok != 'true'
        run: echo "::notice::Staging secrets not set — skipping staging E2E."
      - if: steps.cfg.outputs.ok == 'true'
        uses: actions/checkout@v4
      - if: steps.cfg.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - if: steps.cfg.outputs.ok == 'true'
        run: npm ci
      - if: steps.cfg.outputs.ok == 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.cfg.outputs.ok == 'true'
        run: npm run test:e2e
      - if: ${{ steps.cfg.outputs.ok == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 7

  prod:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: Production
    env:
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - id: cfg
        run: echo "ok=${{ secrets.PROD_SUPABASE_URL != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.cfg.outputs.ok != 'true'
        run: echo "::notice::Prod secrets not set — skipping prod E2E."
      - if: steps.cfg.outputs.ok == 'true'
        uses: actions/checkout@v4
      - if: steps.cfg.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - if: steps.cfg.outputs.ok == 'true'
        run: npm ci
      - if: steps.cfg.outputs.ok == 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.cfg.outputs.ok == 'true'
        run: npm run test:e2e
      - if: ${{ steps.cfg.outputs.ok == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report/
          retention-days: 7
